<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">God's Cake Logo</title>
  <desc id="desc">Premium badge logo with layered cake, frosting, and crown star.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8a3d"/>
      <stop offset="45%" stop-color="#f24a61"/>
      <stop offset="100%" stop-color="#b71d45"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7eb"/>
      <stop offset="100%" stop-color="#ffdca9"/>
    </linearGradient>
    <linearGradient id="frost" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff8f4"/>
      <stop offset="100%" stop-color="#ffe2d8"/>
    </linearGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#8a1538" flood-opacity="0.35"/>
    </filter>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#4a1a24" flood-opacity="0.28"/>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="236" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="8"/>

  <ellipse cx="256" cy="386" rx="154" ry="34" fill="#8d1b40" opacity="0.32"/>

  <g filter="url(#shadow)">
    <ellipse cx="256" cy="330" rx="156" ry="44" fill="#f8c47b"/>
    <rect x="106" y="226" width="300" height="112" rx="40" fill="url(#plate)"/>
    <ellipse cx="256" cy="226" rx="156" ry="52" fill="#f7b05d"/>
  </g>

  <g filter="url(#softShadow)">
    <path d="M130 228c16-15 34-18 50-10 17 9 31 9 44 0 17-10 34-10 52 0 14 8 28 8 44 0 18-10 34-10 51 0 16 10 31 8 45-6v22c-15 16-31 21-50 15-15-5-28-5-40 3-18 11-36 12-54 0-15-10-30-10-46 0-18 11-37 11-56 0-15-9-29-9-42 0-16 11-35 10-56-2v-22z" fill="url(#frost)"/>
    <circle cx="180" cy="266" r="10" fill="#f24a61"/>
    <circle cx="226" cy="288" r="10" fill="#ff8a3d"/>
    <circle cx="273" cy="270" r="10" fill="#f24a61"/>
    <circle cx="320" cy="291" r="10" fill="#ff8a3d"/>
    <circle cx="364" cy="267" r="10" fill="#f24a61"/>
  </g>

  <g>
    <rect x="244" y="120" width="24" height="72" rx="12" fill="#ffd162"/>
    <path d="M256 84c19 17 20 40 0 53-20-13-19-36 0-53z" fill="#ffe07c"/>
    <path d="M256 73c13 11 13 25 0 34-13-9-13-23 0-34z" fill="#ff8a3d"/>
  </g>

  <g fill="#fff3d8" opacity="0.96">
    <path d="M396 132l8 16 17 3-12 12 3 17-16-8-16 8 3-17-12-12 17-3z"/>
    <circle cx="136" cy="146" r="6"/>
